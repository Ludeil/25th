<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="main-heading">To My Dearest</h1>
            <div class="heart-icon">❤️</div>
        </header>
        
        <main>
            <p class="message">
                "Every moment spent with you is like a beautiful dream come true."
            </p>

            <div id="surprise-area" class="hidden">
                <p>You make my world brighter every single day!</p>
                
                <div class="video-container">
                    <iframe 
                        width="100%" 
                        height="500" 
                        src="https://www.youtube.com/embed/-L3HEQt3_b0" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <button id="magic-btn">Click for a Surprise</button>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
